services:
  - type: web
    name: deconstruction-next
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_SITE_URL
        value: https://deconstruction-next.onrender.com
