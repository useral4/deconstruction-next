name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error \
            --max-time 60 \
            --retry 2 \
            --retry-delay 10 \
            https://deconstruction-next.onrender.com/api/health
